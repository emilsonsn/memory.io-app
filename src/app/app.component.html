<div class="app-shell" [class.loading]="loadingService.loading()">
  <router-outlet />
</div>

@if (loadingService.loading()) {
  <div class="app-loading" role="status" aria-live="polite" aria-label="Carregando">
    <div class="app-loading-card">
      <span class="app-loading-mark" aria-hidden="true"></span>
      <span>Carregando...</span>
    </div>
  </div>
}
