<div class="dialog-backdrop" (click)="requestClose()">
  <form
    class="dialog-panel note-dialog"
    [formGroup]="form"
    (ngSubmit)="submit()"
    (focusout)="saveOnFocusOut($event)"
    (click)="$event.stopPropagation()"
  >
    <header class="note-header">
      <button
        class="copy-content-button"
        type="button"
        [attr.aria-label]="contentCopied ? 'Conteudo copiado' : 'Copiar conteudo'"
        [title]="contentCopied ? 'Copiado' : 'Copiar conteudo'"
        (click)="copyContent()"
      >
        <fa-icon [icon]="icons.copy" aria-hidden="true" />
      </button>
      <button class="icon-button" type="button" aria-label="Fechar" (click)="requestClose()">
        <fa-icon [icon]="icons.close" aria-hidden="true" />
      </button>
    </header>

    <div class="note-body">
      <input
        class="note-title"
        type="text"
        formControlName="title"
        aria-label="Titulo"
        placeholder="Titulo"
      >

      <quill-editor
        class="compact-note-editor"
        formControlName="content"
        placeholder="Criar uma nota..."
        theme="snow"
        [modules]="compactEditorModules"
      />
    </div>

    @if (advancedOpen) {
      <section class="advanced-options" aria-label="Opcoes avancadas">
        <div class="form-grid">
          <label>
            Cor
            <div class="dialog-color-picker" role="radiogroup" aria-label="Cor da memoria">
              <button
                type="button"
                class="color-swatch gray"
                title="Padrao"
                aria-label="Padrao"
                [class.selected]="!form.controls.color.value"
                (click)="selectColor(null)"
              ></button>
              @for (color of colors; track color.value) {
                <button
                  type="button"
                  class="color-swatch {{ color.value }}"
                  [title]="color.label"
                  [attr.aria-label]="color.label"
                  [class.selected]="form.controls.color.value === color.value"
                  (click)="selectColor(color.value)"
                ></button>
              }
            </div>
          </label>

          <label>
            Data de vencimento
            <input type="datetime-local" formControlName="due_date">
          </label>
        </div>

        <div class="category-field">
          <span class="field-label">Categorias</span>

          <button
            class="category-select-trigger"
            type="button"
            [attr.aria-expanded]="categoriesOpen"
            (click)="toggleCategories()"
          >
            <span>{{ categorySummary() }}</span>
            <fa-icon class="select-chevron" [icon]="icons.chevronDown" aria-hidden="true" />
          </button>

          @if (categoriesOpen) {
            <div class="category-select-panel">
              @for (category of categories; track category.id) {
                <label class="category-option">
                  <input
                    type="checkbox"
                    [checked]="isCategorySelected(category.id)"
                    (change)="toggleCategory(category.id)"
                  >
                  <span>{{ categoryDisplay(category) }}</span>
                </label>
              }
            </div>
          }

          @if (selectedCategories().length > 0) {
            <div class="selected-category-list" aria-label="Categorias selecionadas">
              @for (category of selectedCategories(); track category.id) {
                <button class="category-chip" type="button" (click)="toggleCategory(category.id)">
                  <span>{{ categoryDisplay(category) }}</span>
                  <fa-icon [icon]="icons.remove" aria-hidden="true" />
                </button>
              }
            </div>
          }
        </div>
      </section>
    }

    <div class="dialog-actions">
      <button
        class="advanced-toggle"
        type="button"
        [attr.aria-expanded]="advancedOpen"
        (click)="toggleAdvanced()"
      >
        {{ advancedOpen ? 'Ocultar opcoes' : '+ Mais opcoes' }}
      </button>

      <div class="action-group">
        <button class="primary-button" type="button" (click)="expandNote()">
          <fa-icon [icon]="icons.expand" aria-hidden="true" />
          Expandir
        </button>
      </div>
    </div>
  </form>
</div>
