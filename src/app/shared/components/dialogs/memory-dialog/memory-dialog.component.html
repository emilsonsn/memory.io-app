<div class="dialog-backdrop" (click)="closeDialog.emit()">
  <form class="dialog-panel note-dialog" [formGroup]="form" (ngSubmit)="submit()" (click)="$event.stopPropagation()">
    <header class="note-header">
      <button class="icon-button" type="button" aria-label="Fechar" (click)="closeDialog.emit()">×</button>
    </header>

    <div class="note-body">
      <input
        class="note-title"
        type="text"
        formControlName="title"
        aria-label="Titulo"
        placeholder="Titulo"
      >

      <textarea
        class="note-content"
        rows="10"
        formControlName="content"
        aria-label="Conteudo"
        placeholder="Criar uma nota..."
      ></textarea>
    </div>

    @if (advancedOpen) {
      <section class="advanced-options" aria-label="Opcoes avancadas">
        <div class="form-grid">
          <label>
            Cor
            <select formControlName="color">
              <option [ngValue]="null">Padrao</option>
              @for (color of colors; track color.value) {
                <option [ngValue]="color.value">{{ color.label }}</option>
              }
            </select>
          </label>

          <label>
            Due date
            <input type="datetime-local" formControlName="due_date">
          </label>
        </div>

        <div class="category-field">
          <span class="field-label">Pastas</span>

          <button
            class="category-select-trigger"
            type="button"
            [attr.aria-expanded]="categoriesOpen"
            (click)="toggleCategories()"
          >
            <span>{{ categorySummary() }}</span>
            <span class="select-chevron" aria-hidden="true">⌄</span>
          </button>

          @if (categoriesOpen) {
            <div class="category-select-panel">
              @for (category of categories; track category.id) {
                <label class="category-option">
                  <input
                    type="checkbox"
                    [checked]="isCategorySelected(category.id)"
                    (change)="toggleCategory(category.id)"
                  >
                  <span>{{ categoryDisplay(category) }}</span>
                </label>
              }
            </div>
          }

          @if (selectedCategories().length > 0) {
            <div class="selected-category-list" aria-label="Pastas selecionadas">
              @for (category of selectedCategories(); track category.id) {
                <button class="category-chip" type="button" (click)="toggleCategory(category.id)">
                  <span>{{ categoryDisplay(category) }}</span>
                  <span aria-hidden="true">×</span>
                </button>
              }
            </div>
          }
        </div>
      </section>
    }

    <div class="dialog-actions">
      <button
        class="advanced-toggle"
        type="button"
        [attr.aria-expanded]="advancedOpen"
        (click)="toggleAdvanced()"
      >
        {{ advancedOpen ? 'Ocultar opcoes avancadas' : 'Opcoes avancadas' }}
      </button>

      <div class="action-group">
        <button class="ghost-button" type="button" (click)="closeDialog.emit()">Cancelar</button>
        <button class="primary-button" type="submit" [disabled]="form.invalid || saving">
          {{ saving ? 'Salvando...' : 'Salvar memoria' }}
        </button>
      </div>
    </div>
  </form>
</div>
