<div class="dialog-backdrop" (click)="closeDialog.emit()">
  <form class="dialog-panel" [formGroup]="form" (ngSubmit)="submit()" (click)="$event.stopPropagation()">
    <header class="dialog-header">
      <div>
        <h2>{{ category ? 'Editar pasta' : 'Nova pasta' }}</h2>
        <p class="muted">{{ category ? 'Atualize a categoria desta biblioteca.' : 'Crie uma pasta para organizar suas memorias.' }}</p>
      </div>
      <button class="icon-button" type="button" aria-label="Fechar" (click)="closeDialog.emit()">×</button>
    </header>

    <div class="form-stack">
      <label>
        Nome
        <input type="text" formControlName="label" placeholder="Projetos, Estudos, Ideias">
      </label>

      <label>
        Descricao
        <textarea rows="3" formControlName="description" placeholder="Contexto dessa pasta"></textarea>
      </label>

      <div class="form-grid">
        <label>
          Cor
          <select formControlName="color">
            <option [ngValue]="null">Padrao</option>
            @for (color of colors; track color.value) {
              <option [ngValue]="color.value">{{ color.label }}</option>
            }
          </select>
        </label>

        <label>
          Pasta pai
          <select formControlName="parent_id">
            <option [ngValue]="null">Raiz</option>
            @for (option of parentOptions(); track option.id) {
              <option [ngValue]="option.id">{{ categoryDisplay(option) }}</option>
            }
          </select>
        </label>
      </div>
    </div>

    <div class="dialog-actions">
      <button class="ghost-button" type="button" (click)="closeDialog.emit()">Cancelar</button>
      <button class="primary-button" type="submit" [disabled]="form.invalid || saving">
        {{ saving ? 'Salvando...' : 'Salvar pasta' }}
      </button>
    </div>
  </form>
</div>
