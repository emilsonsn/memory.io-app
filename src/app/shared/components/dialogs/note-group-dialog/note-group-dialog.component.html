<div class="dialog-backdrop" (click)="closeDialog.emit()">
  <form class="dialog-panel note-group-dialog" [formGroup]="form" (ngSubmit)="submit()" (click)="$event.stopPropagation()">
    <header class="dialog-header">
      <div>
        <h2>Nova categoria</h2>
        <p class="muted">Crie uma categoria para agrupar essas notas.</p>
      </div>
      <button class="icon-button" type="button" aria-label="Fechar" (click)="closeDialog.emit()">
        <fa-icon [icon]="icons.close" aria-hidden="true" />
      </button>
    </header>

    <div class="form-stack">
      <label>
        Nome
        <input type="text" formControlName="label" placeholder="Ex.: Estudos, Projeto X">
      </label>

      <label>
        Descricao
        <textarea rows="3" formControlName="description" placeholder="Contexto dessa organizacao"></textarea>
      </label>
    </div>

    <div class="dialog-actions">
      <button class="ghost-button" type="button" (click)="closeDialog.emit()">Cancelar</button>
      <button class="primary-button" type="submit" [disabled]="form.invalid || saving">
        {{ saving ? 'Criando...' : 'Criar categoria' }}
      </button>
    </div>
  </form>
</div>
