<main class="auth-shell">
  <section class="auth-panel">
    <a class="auth-logo" routerLink="/login" aria-label="MemoryIA">
      <img src="/logos/memoryia_horizontal.png" alt="MemoryIA">
    </a>
    <h1>Entrar</h1>
    <p class="muted">Acesse sua biblioteca pessoal de memorias.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form-stack">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" placeholder="voce@memoryia.com">
      </label>

      <label>
        Senha
        <input type="password" formControlName="password" autocomplete="current-password" placeholder="Sua senha">
      </label>

      @if (error()) {
        <p class="form-error">{{ error() }}</p>
      }

      <button class="primary-button" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-link">Ainda nao tem conta? <a routerLink="/register">Criar usuario</a></p>
  </section>
</main>
