<main class="auth-shell">
  <section class="auth-panel">
    <a class="brand" routerLink="/login">memory.io</a>
    <h1>Criar usuario</h1>
    <p class="muted">Comece com uma conta simples e organize suas memorias.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form-stack">
      <label>
        Nome
        <input type="text" formControlName="name" autocomplete="name" placeholder="Seu nome">
      </label>

      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" placeholder="voce@memory.io">
      </label>

      <label>
        Senha
        <input type="password" formControlName="password" autocomplete="new-password" placeholder="Minimo de 8 caracteres">
      </label>

      <label>
        Confirmar senha
        <input type="password" formControlName="password_confirmation" autocomplete="new-password" placeholder="Repita a senha">
      </label>

      @if (error()) {
        <p class="form-error">{{ error() }}</p>
      }

      <button class="primary-button" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Criando...' : 'Criar usuario' }}
      </button>
    </form>

    <p class="auth-link">Ja tem conta? <a routerLink="/login">Entrar</a></p>
  </section>
</main>
